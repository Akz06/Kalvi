# ─── Kalvi Frontend — Railway deployment config ──────────────────────────────
# In Railway: New Service → GitHub Repo → Akz06/Kalvi → Root Directory = frontend
#
# You must set this in Railway → Service → Variables:
#   VITE_API_URL   — your backend Railway URL, e.g. https://kalvi-backend.up.railway.app
#
# Railway injects PORT automatically. `serve` reads it via ${PORT:-3000}.
# ─────────────────────────────────────────────────────────────────────────────

[build]
builder = "nixpacks"
buildCommand = "npm ci && npm run build"

[deploy]
startCommand = "npx serve -s dist -l ${PORT:-3000}"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
