# ─── Kalvi — Frontend (React + Vite) ────────────────────────────────────────
# This file tells Railway/Nixpacks exactly how to build and run the frontend.
# Set "Root Directory" = frontend/ in the Railway service settings.

[phases.setup]
nixPkgs = ["nodejs_20", "npm-9_x"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npx serve -s dist -l ${PORT:-3000}"
