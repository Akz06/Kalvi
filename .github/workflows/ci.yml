name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Backend ──────────────────────────────────────────────────────────────
  backend:
    name: Backend — typecheck · lint · test · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # Use PostgreSQL service container for accurate CI testing
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: erp
          POSTGRES_PASSWORD: erp_ci_password
          POSTGRES_DB: school_erp_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    env:
      DATABASE_URL: "postgresql://erp:erp_ci_password@localhost:5432/school_erp_test"
      JWT_SECRET: "ci-only-secret-not-used-in-production-0123456789abcdef"
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push schema to CI database
        run: npx prisma db push --skip-generate --accept-data-loss

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — typecheck · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc + Vite)
        run: npm run build

  # ─── Summary ──────────────────────────────────────────────────────────────
  ci-passed:
    name: CI passed
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All CI checks passed ✅"
